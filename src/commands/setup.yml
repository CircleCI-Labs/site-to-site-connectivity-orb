---
description: >
  Setup CircleCI tunnel for site to site connectivity

parameters:
  tunnel-address:
    type: env_var_name
    description: >
      Environment variable name containing the tunnel address for the
      CircleCI tunnel
    default: "TUNNEL_ADDRESS"
  tunnel-port:
    type: env_var_name
    description: >
      Environment variable name containing the tunnel port for the
      CircleCI tunnel
    default: "TUNNEL_PORT"
  verify-tunnel:
    type: boolean
    description: "Verify the connection before exiting"
    default: true
  verify-tunnel-attempts:
    type: integer
    description: "Number of attempts before failing to verify the tunnel"
    default: 30
  registration-retry-attempts:
    type: integer
    description: "Number of retry attempts for IP registration on 500 errors"
    default: 3
  registration-retry-delay:
    type: integer
    description: "Seconds to wait between IP registration retry attempts"
    default: 5
  debug:
    type: boolean
    description: "Enable debug mode"
    default: false

steps:
  - run:
      environment:
        PARAM_TUNNEL_ADDRESS: << parameters.tunnel-address >>
        PARAM_TUNNEL_PORT: << parameters.tunnel-port >>
        PARAM_VERIFY_TUNNEL: << parameters.verify-tunnel >>
        PARAM_VERIFY_TUNNEL_ATTEMPTS: << parameters.verify-tunnel-attempts >>
        PARAM_REGISTRATION_RETRY_ATTEMPTS: << parameters.registration-retry-attempts >>
        PARAM_REGISTRATION_RETRY_DELAY: << parameters.registration-retry-delay >>
        DEBUG: << parameters.debug >>
      name: Setup the CircleCI tunnel
      command: <<include(scripts/setup.sh)>>
