---
description: >
  Example workflows demonstrating how to use the site to site connectivity
  orb on Linux (Docker) and Windows (machine) executors. After setup, use
  the built-in checkout step — SSH is routed through tunnel-proxy automatically.

usage:
  version: 2.1

  orbs:
    site-to-site-connectivity: cci-labs/site-to-site-connectivity@1.0.0

  jobs:
    build-with-private-repo-linux:
      docker:
        - image: cimg/base:current
      steps:
        - site-to-site-connectivity/setup
        - checkout
        - run:
            name: Build application
            command: |
              echo "Building application..."
        - site-to-site-connectivity/cleanup:
            when: always

    build-with-private-repo-windows:
      executor: site-to-site-connectivity/windows
      steps:
        - site-to-site-connectivity/setup
        - checkout
        - run:
            name: Build application
            command: |
              echo "Building application..."
        - site-to-site-connectivity/cleanup:
            when: always

  workflows:
    private-repo-workflow:
      jobs:
        - build-with-private-repo-linux:
            context:
              - site-to-site-tunnel
        - build-with-private-repo-windows:
            context:
              - site-to-site-tunnel
