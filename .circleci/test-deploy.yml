version: 2.1
orbs:
  continuation: cci-labs/site-to-site-connectivity@dev:alpha
  orb-tools: circleci/orb-tools@11.5

filters: &filters
  tags:
    only: /.*/

jobs:
  command-tests:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Install bats
          command: sudo apt-get update -qq && sudo apt-get install -y bats python3
      - run:
          name: Run unit tests
          command: bats src/tests/setup.bats

  linux-smoke-test:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - continuation/setup
      - run:
          name: Verify HTTPS_PROXY is set
          command: |
            source "$BASH_ENV"
            [ -n "${HTTPS_PROXY:-}" ] || (echo "HTTPS_PROXY not set" && exit 1)
      - continuation/cleanup

  macos-smoke-test:
    macos:
      xcode: "16.1.0"
    resource_class: macos.m1.medium.gen1
    steps:
      - checkout
      - continuation/setup
      - run:
          name: Verify HTTPS_PROXY is set
          command: |
            source "$BASH_ENV"
            [ -n "${HTTPS_PROXY:-}" ] || (echo "HTTPS_PROXY not set" && exit 1)
      - continuation/cleanup

  windows-smoke-test:
    machine:
      image: windows-server-2022-gui:current
      resource_class: windows.medium
      shell: bash.exe
    steps:
      - checkout
      - continuation/setup
      - continuation/cleanup

workflows:
  test-deploy:
    jobs:
      - command-tests:
          filters: *filters
      - linux-smoke-test:
          context: site-to-site-tunnel
          filters: *filters
      - macos-smoke-test:
          context: site-to-site-tunnel
          filters: *filters
      - windows-smoke-test:
          context: site-to-site-tunnel
          filters: *filters
      - orb-tools/pack:
          filters: *filters
      - orb-tools/publish:
          orb-name: cci-labs/site-to-site-connectivity
          vcs-type: << pipeline.project.type >>
          pub-type: production
          requires:
            - orb-tools/pack
            - command-tests
            - linux-smoke-test
            - macos-smoke-test
            - windows-smoke-test
          context: orb-publishing
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

# VS Code Extension Version: 1.4.0
