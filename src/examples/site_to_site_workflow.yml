---
description: >
  Example workflow demonstrating how to use the site to site connectivity
  orb to access private repositories via CircleCI tunnel. After setup, use
  the built-in checkout step — SSH is routed through tunnel-proxy automatically.

usage:
  version: 2.1

  orbs:
    site-to-site-connectivity: your-namespace/site-to-site-connectivity@0.0.1

  jobs:
    build-with-private-repo:
      docker:
        - image: cimg/base:current
      steps:
        - site-to-site-connectivity/setup
        - checkout
        - run:
            name: Build application
            command: |
              echo "Building application..."
        - site-to-site-connectivity/cleanup:
            when: always

  workflows:
    private-repo-workflow:
      jobs:
        - build-with-private-repo:
            context:
              - site-to-site-tunnel
